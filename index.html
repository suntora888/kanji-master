    // =====================================================================
    // Auto-build word DB from kanji compounds
    // =====================================================================
    const BUILTIN_WORD_DB = [];
    const _ws = new Set();
    BUILTIN_KANJI_DB.forEach(k => {
      k.compounds.forEach(c => {
        const m = c.match(/^(.+?)\s*\((.+?)\s*-\s*(.+?)\)$/);
        if (m && !_ws.has(m[1])) { _ws.add(m[1]); BUILTIN_WORD_DB.push({word:m[1],reading:m[2].trim(),meaning:m[3].trim()}); }
      });
    });

    // カタカナ→ひらがな変換（"スイ" → "すい"）
    const kataToHira = s => s.replace(/[\u30A1-\u30F6]/g, c => String.fromCharCode(c.charCodeAt(0) - 0x60));
    // 検索クエリ正規化：小文字化 + カタカナ→ひらがな
    const norm = s => kataToHira(s.toLowerCase().trim());

    const offlineSearchWords = (kw) => {
      const q = norm(kw);

      // 漢字1文字の直接検索（例: "水"→水の熟語一覧）
      if(/^[\u4E00-\u9FFF]$/.test(kw.trim())) {
        const k = offlineGetKanji(kw.trim());
        if(k) return k.compounds.map(c=>{const m=c.match(/^(.+?)\s*\((.+?)\s*-\s*(.+?)\)$/);return m?{word:m[1],reading:m[2].trim(),meaning:m[3].trim()}:null;}).filter(Boolean).slice(0,5);
      }

      // 熟語DB検索（かな正規化あり）
      let r = BUILTIN_WORD_DB.filter(w =>
        w.word.includes(kw) ||
        norm(w.reading).includes(q) ||
        w.meaning.toLowerCase().includes(q)
      );

      // 漢字DB検索フォールバック（読み・意味・タグで）
      if(!r.length) {
        BUILTIN_KANJI_DB.filter(k =>
          k.kanji.includes(kw) ||
          norm(k.reading).includes(q) ||    // "すい"が"スイ/みず"にマッチ
          k.meaning.toLowerCase().includes(q) ||
          k.tags.some(t => norm(t).includes(q))
        ).forEach(k => k.compounds.forEach(c => {
          const m = c.match(/^(.+?)\s*\((.+?)\s*-\s*(.+?)\)$/);
          if(m) r.push({word:m[1],reading:m[2].trim(),meaning:m[3].trim()});
        }));
      }

      const s=new Set(); r=r.filter(x=>{if(s.has(x.word))return false;s.add(x.word);return true;}); return r.slice(0,5);
    };
    const offlineGetKanji = (ch) => BUILTIN_KANJI_DB.find(k=>k.kanji===ch)||null;
    const offlineRandomKanji = (filter='All', favList=[]) => {
      let pool;
      if(filter==='FAV') pool = BUILTIN_KANJI_DB.filter(k=>favList.includes(k.kanji));
      else pool = filter==='All' ? BUILTIN_KANJI_DB : BUILTIN_KANJI_DB.filter(k=>k.level===filter);
      if(!pool.length) return BUILTIN_KANJI_DB[0];
      return pool[Math.floor(Math.random()*pool.length)];
    };

          <div className="bg-[#1C1917] rounded-2xl max-w-lg w-full p-6 shadow-2xl fade-in border border-stone-700" onClick={e=>e.stopPropagation()}>
            <div className="flex justify-between items-center mb-4">
              <h3 className="font-black text-lg text-stone-100 flex items-center gap-2"><I.Key className="w-5 h-5 text-red-400"/> API Key Settings</h3>
              <button onClick={onClose} className="p-1 hover:bg-stone-700 rounded-lg text-stone-400"><I.X className="w-5 h-5"/></button>
            </div>
            <div className="mb-4 text-sm text-stone-400 space-y-2">
              <p className="font-bold text-stone-300">Gemini API Key (Free / ฟรี)</p>
              <p>Without API key: {BUILTIN_KANJI_DB.length}+ built-in kanji. With key: unlimited AI content.</p>
              <p className="font-bold text-stone-200">How to get a free key / วิธีรับ API Key ฟรี:</p>
              <ol className="list-decimal ml-5 space-y-1">
                <li>Go to <span className="font-mono text-red-400 font-bold">aistudio.google.com</span></li>
                <li>Sign in with Google / ลงชื่อเข้าใช้</li>
                <li>Click "Get API Key" → "Create API Key"</li>
                <li>Copy & paste below / คัดลอกแล้ววางด้านล่าง</li>
              </ol>
            </div>
            <input type="text" value={key} onChange={e=>setKey(e.target.value)} placeholder="Paste your Gemini API key here..."
              className="w-full px-4 py-3 border-2 border-stone-700 rounded-xl focus:border-red-500 outline-none text-sm font-mono bg-stone-800 text-stone-100 placeholder-stone-500 mb-4"/>
            <div className="flex gap-3">
              <button onClick={()=>{onSave(key.trim());onClose();}} className="flex-1 px-4 py-3 bg-red-700 text-white rounded-xl font-bold hover:bg-red-600 transition-colors flex items-center justify-center gap-2">
                <I.Check className="w-4 h-4"/> Save / บันทึก
              </button>
              <button onClick={()=>{onSave('');onClose();}} className="px-4 py-3 bg-stone-700 text-stone-300 rounded-xl font-bold hover:bg-stone-600 transition-colors text-sm">
                Use Offline
              </button>
            </div>
          </div>
        </div>
      );
    };

    const App = () => {
      const [userApiKey,setUserApiKey] = useState(()=>{try{return localStorage.getItem('kanji_api_key')||'';}catch{return '';}});
      const [jlptFilter,setJlptFilter] = useState(()=>{try{return localStorage.getItem('kanji_jlpt_filter')||'All';}catch{return 'All';}});
      const modelName = "gemini-2.0-flash";
      const [kanjiData,setKanjiData] = useState(null);
      const [paths,setPaths] = useState([]);
      const [loading,setLoading] = useState(false);
      const [error,setError] = useState(null);
      const [searchInput,setSearchInput] = useState('');
      const [isListening,setIsListening] = useState(false);
      const [wordCandidates,setWordCandidates] = useState([]);
      const [selectedWord,setSelectedWord] = useState(null);
      const [selectableKanjis,setSelectableKanjis] = useState([]);
      const [currentStroke,setCurrentStroke] = useState(-1);
      const [isAnimating,setIsAnimating] = useState(false);
      const [svgFailed,setSvgFailed] = useState(false);
      const [showApiModal,setShowApiModal] = useState(false);
      const isOnline = !!userApiKey;

      // Favorites
      const [favorites,setFavorites] = useState(()=>{try{return JSON.parse(localStorage.getItem('kanji_fav_th')||'[]');}catch{return [];}});
      const toggleFavorite = (k) => {
        const n = favorites.includes(k) ? favorites.filter(x=>x!==k) : [...favorites,k];
        setFavorites(n); try{localStorage.setItem('kanji_fav_th',JSON.stringify(n));}catch{}
      };
      const isFav = (k) => favorites.includes(k);

      // Quiz
      const [quizMode,setQuizMode] = useState(false);
      const [quiz,setQuiz] = useState(null); // {kanji, qType, correct, choices, selected, score, total}
      const startQuiz = () => {
        setQuiz({kanji:null,qType:'reading',correct:'',choices:[],selected:null,score:0,total:0});
        nextQuizQuestion({score:0,total:0});
      };
      const nextQuizQuestion = (prev) => {
        const pool = jlptFilter==='All' ? BUILTIN_KANJI_DB : BUILTIN_KANJI_DB.filter(k=>k.level===jlptFilter);
        if(!pool.length) return;
        const k = pool[Math.floor(Math.random()*pool.length)];
        const qType = Math.random()>0.5 ? 'reading' : 'meaning';
        const correct = qType==='reading' ? k.reading : k.meaning;
        const others = pool.filter(x=>x.kanji!==k.kanji).sort(()=>Math.random()-0.5).slice(0,3);
        const wrongs = others.map(x=>qType==='reading'?x.reading:x.meaning);
        const choices = [...wrongs,correct].sort(()=>Math.random()-0.5);
        setQuiz({kanji:k, qType, correct, choices, selected:null, score:prev?.score||0, total:prev?.total||0});
        fetchKanji(k.kanji);
      };
      const answerQuiz = (choice) => {
        if(!quiz||quiz.selected) return;
        const correct = choice===quiz.correct;
        setQuiz(q=>({...q, selected:choice, score:q.score+(correct?1:0), total:q.total+1}));
      };
      const exitQuiz = () => { setQuizMode(false); setQuiz(null); };

      // Mobile tab
      const [mobileTab, setMobileTab] = useState('learn');

      const saveApiKey = (k) => { setUserApiKey(k); try{localStorage.setItem('kanji_api_key',k);}catch{} };
      const changeFilter = (lv) => { setJlptFilter(lv); try{localStorage.setItem('kanji_jlpt_filter',lv);}catch{} };

      const geminiCall = async (sys, txt, schema) => {
        const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${userApiKey}`,{
          method:'POST', headers:{'Content-Type':'application/json'},
          body:JSON.stringify({contents:[{parts:[{text:txt}]}],systemInstruction:{parts:[{text:sys}]},generationConfig:{responseMimeType:"application/json",responseSchema:schema}})
        });
        if(!r.ok) throw new Error(`API Error ${r.status}`);
        const d = await r.json();
        let t = d.candidates[0].content.parts[0].text;
        t = t.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
        return JSON.parse(t);
      };

      const startListening = () => {
        setError(null);
        const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
        if(!SR){setError("Voice not supported");return;}
        const r=new SR();r.start();setIsListening(true);
        r.onresult=(e)=>{const t=e.results[0][0].transcript.trim();if(t){setSearchInput(t);searchWords(t);}setIsListening(false);};
        r.onerror=()=>{setIsListening(false);setError("Could not hear / ไม่ได้ยินเสียง");};
        r.onend=()=>setIsListening(false);
      };

      const searchWords = async (keyword) => {
        setLoading(true);setError(null);setWordCandidates([]);setSelectedWord(null);setSelectableKanjis([]);setKanjiData(null);setPaths([]);setSvgFailed(false);
        if(!isOnline) {
          const res=offlineSearchWords(keyword);
          if(res.length>0) setWordCandidates(res);
          else setError("見つかりません。例: みず・かわ・やま・たべる / water・fire・school / น้ำ・ไฟ・กิน / 水・火・山");
          setLoading(false); return;
        }
        try {
          const levelHint = jlptFilter!=='All' ? ` JLPT ${jlptFilter}レベルを優先。` : '';
          const data = await geminiCall(
            `あなたは優秀な日本語教師です。キーワードに関連する漢字を使った日本語単語を3〜5個提案。meaningにはタイ語と英語を併記。JSON配列で出力。${levelHint}`,
            `Keyword: ${keyword}`,
            {type:"ARRAY",items:{type:"OBJECT",properties:{word:{type:"STRING"},reading:{type:"STRING"},meaning:{type:"STRING"}},required:["word","reading","meaning"]}}
          );
          if(data?.length>0) setWordCandidates(data);
          else setError("No words found");
        } catch(e) {
          const res=offlineSearchWords(keyword);
          if(res.length>0){setWordCandidates(res);setError(null);}
          else setError(`API failed. (${e.message})`);
        }
        setLoading(false);
      };

      const handleWordSelect = (w) => {
        setSelectedWord(w);
        const kanjis=w.word.match(/[\u4E00-\u9FFF]/g)||[];
        setSelectableKanjis(kanjis);
        if(kanjis.length>0) fetchKanji(kanjis[0]);
        else setError("No Kanji in this word");
      };

      const fetchKanji = async (target=null, filter=null) => {
        const activeFilter = filter !== null ? filter : jlptFilter;
        setLoading(true);setError(null);setKanjiData(null);setPaths([]);setCurrentStroke(-1);setSvgFailed(false);
        if(!isOnline){
          let d=target?offlineGetKanji(target):offlineRandomKanji(activeFilter,favorites);
          if(!d&&target) d={kanji:target,reading:"(offline)",meaning:"(no data)",tips:"Add API key for full data / เพิ่ม API Key เพื่อข้อมูลครบ",compounds:[],level:null};
          setKanjiData(d); await fetchSVG(d.kanji); return;
        }
        try {
          const seed=Math.floor(Math.random()*100000);
          const levelHint = activeFilter!=='All' ? `JLPT ${activeFilter}レベルの` : '';
          const q=target?`漢字「${target}」について生成してください。`:`${levelHint}常用漢字をランダムに1つ選び生成（シード: ${seed}）`;
          const data = await geminiCall(
            "あなたは優秀な日本語教師です。タイ人・英語話者向けにJSON出力。meaning/tipsはタイ語メイン+英語併記。日本語解説不要。",q,
            {type:"OBJECT",properties:{kanji:{type:"STRING"},reading:{type:"STRING"},meaning:{type:"STRING"},tips:{type:"STRING"},compounds:{type:"ARRAY",items:{type:"STRING"}}},required:["kanji","reading","meaning","tips","compounds"]}
          );
          if(data){setKanjiData(data);await fetchSVG(data.kanji);return;}
        } catch(e) {
          let d=target?offlineGetKanji(target):offlineRandomKanji(activeFilter,favorites);
          if(!d&&target) d={kanji:target,reading:"(offline)",meaning:"(API failed)",tips:e.message,compounds:[],level:null};
          if(d){setKanjiData(d);await fetchSVG(d.kanji);return;}
          setError("Failed to load kanji"); setLoading(false);
        }
      };

      const fetchSVG = async (ch) => {
        try {
          const hex=ch.charCodeAt(0).toString(16).padStart(5,'0');
          const r=await fetch(`https://raw.githubusercontent.com/KanjiVG/kanjivg/master/kanji/${hex}.svg`);
          if(!r.ok) throw new Error("SVG not found");
          const txt=await r.text();
          const doc=new DOMParser().parseFromString(txt,"image/svg+xml");
          const ps=Array.from(doc.querySelectorAll('path')).map(p=>p.getAttribute('d')).filter(Boolean);
          if(!ps.length) throw new Error("Empty SVG");
          setPaths(ps);setSvgFailed(false);startAnimation(ps.length);
        } catch(e) {console.warn("SVG:",e.message);setPaths([]);setSvgFailed(true);}
        finally {setLoading(false);}
      };

      const startAnimation = (total) => {
        setCurrentStroke(-1);setIsAnimating(true);let cur=0;
        const id=setInterval(()=>{setCurrentStroke(cur);cur++;if(cur>=total){clearInterval(id);setIsAnimating(false);}},1200);
      };
      const handleReplay = () => { if(paths.length>0&&!isAnimating) startAnimation(paths.length); };
      const handleSearchSubmit = (e) => { e.preventDefault(); if(searchInput.trim()) searchWords(searchInput.trim()); };
      const handleRandom = () => { setSearchInput('');setWordCandidates([]);setSelectedWord(null);setSelectableKanjis([]);fetchKanji(null, jlptFilter); };

      useEffect(()=>{fetchKanji();},[]);

      // JLPT filter button config
      const filterBtns = [
        {lv:'All', label:'All', active:'bg-stone-200 text-stone-900', inactive:'bg-stone-800 text-stone-400 border border-stone-700 hover:bg-stone-700'},
        {lv:'N5',  label:'N5',  active:'bg-emerald-500 text-white', inactive:'bg-emerald-900/30 text-emerald-400 border border-emerald-800 hover:bg-emerald-900/50'},
        {lv:'N4',  label:'N4',  active:'bg-blue-500 text-white',    inactive:'bg-blue-900/30 text-blue-400 border border-blue-800 hover:bg-blue-900/50'},
        {lv:'N3',  label:'N3',  active:'bg-violet-500 text-white',  inactive:'bg-violet-900/30 text-violet-400 border border-violet-800 hover:bg-violet-900/50'},
      ];

      return (
        <div className="min-h-screen flex items-start justify-center p-4 pb-24 lg:pb-4 lg:items-center font-sans text-stone-100">
          <ApiKeyModal show={showApiModal} onClose={()=>setShowApiModal(false)} currentKey={userApiKey} onSave={saveApiKey}/>
          <div className="max-w-6xl w-full grid grid-cols-1 lg:grid-cols-2 gap-6 lg:gap-8 items-start">
            {/* LEFT — Kanji SVG (mobile: hidden when learn tab) */}
            <div className={`bg-[#1C1917] p-6 md:p-8 rounded-[2rem] shadow-[0_12px_40px_rgba(0,0,0,0.5)] border border-[#2A2520] flex-col items-center ${mobileTab==='kanji'?'flex':'hidden'} lg:flex`}>
              <div className="w-full text-center mb-4 pb-4 border-b border-[#2A2520]">
                <div className="flex justify-center items-center gap-3 mb-1">
                  <I.Grad className="w-8 h-8 text-red-500"/>
                  <h1 className="text-4xl font-black text-stone-100 tracking-tighter">Kanji <span className="text-red-400">Master</span></h1>
                  <div className="w-9 h-9 bg-white rounded-xl flex items-center justify-center shadow-[0_2px_10px_rgba(0,0,0,0.5)]"><span className="text-base font-black font-serif" style={{color:'#111'}}>漢</span></div>
                </div>
                <h2 className="text-sm font-black text-stone-400 tracking-[0.3em] mt-1 mb-2">漢字マスター</h2>
                <div className="text-[10px] font-bold text-stone-500 tracking-widest mb-1">v09-TH · JLPT N5+N4+N3</div>
                <div className="flex items-center justify-center gap-1 mb-3">
                  <span className="text-[10px] font-black px-2 py-0.5 rounded-full bg-orange-900/50 text-orange-300 border border-orange-800">TH</span>
                  <span className="text-stone-600 text-[10px]">·</span>
                  <span className="text-[10px] font-black px-2 py-0.5 rounded-full bg-blue-900/50 text-blue-300 border border-blue-800">EN</span>
                  <span className="text-stone-600 text-[10px]">·</span>
                  <span className="text-[10px] font-black px-2 py-0.5 rounded-full bg-red-900/50 text-red-300 border border-red-800">JP</span>
                </div>
                <div className="flex items-center justify-center gap-3 flex-wrap">
                  <button onClick={()=>setShowApiModal(true)} className={`flex items-center gap-1.5 text-xs font-bold px-3 py-1.5 rounded-full transition-all ${isOnline?'bg-green-900/40 text-green-400 border border-green-800 hover:bg-green-900/60':'bg-stone-800 text-stone-400 border border-stone-600 hover:bg-stone-700'}`}>
                    <I.Key className="w-3 h-3"/>
                    {isOnline ? 'Online (Gemini AI)' : `Offline (${BUILTIN_KANJI_DB.length} Kanji)`}
                  </button>
                  <button onClick={()=>{ setQuizMode(true); startQuiz(); }} className="flex items-center gap-1.5 text-xs font-bold px-3 py-1.5 rounded-full bg-amber-900/40 text-amber-300 border border-amber-800 hover:bg-amber-900/60 transition-all">
                    <I.Trophy className="w-3 h-3"/> Quiz
                  </button>
                </div>
              </div>

              {loading && !kanjiData ? (
                <div className="flex-1 w-full flex flex-col items-center justify-center text-stone-400 min-h-[300px]">
                  <I.Load className="animate-spin w-12 h-12 mb-4 text-red-600"/>
                  <p className="font-bold tracking-widest text-sm">Loading...</p>
                </div>
              ) : kanjiData && paths.length > 0 ? (
                <div className="flex-1 w-full flex flex-col items-center justify-start mt-2">
                  <div className="relative w-64 h-64 sm:w-72 sm:h-72 lg:w-80 lg:h-80 bg-[#161310] border-2 border-dashed border-stone-700 rounded-2xl overflow-hidden shadow-inner">
                    <div className="absolute inset-0 pointer-events-none"><div className="absolute top-1/2 w-full h-px bg-stone-700"></div><div className="absolute left-1/2 w-px h-full bg-stone-700"></div></div>
                    <svg viewBox="0 0 109 109" className="w-full h-full p-4">
                      {paths.map((d,i)=>(<path key={`bg-${i}`} d={d} fill="none" stroke="#3a3530" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/>))}
                      {paths.map((d,i)=>(<path key={`s-${i}-${currentStroke}`} d={d} fill="none" stroke={i===currentStroke?"#ef4444":"#e7e5e4"} strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" className={i===currentStroke?"animate-draw":""} style={{visibility:i<=currentStroke?'visible':'hidden'}}/>))}
                    </svg>
                  </div>
                  <div className="flex items-center gap-4 mt-6">
                    <button onClick={handleReplay} disabled={isAnimating} className="flex items-center gap-2 px-6 py-3 bg-stone-800 text-white rounded-full font-bold hover:bg-stone-700 disabled:opacity-50 transition-all shadow-md text-sm">
                      <I.Play className="w-4 h-4" fill="currentColor"/> Replay
                    </button>
                    <div className="text-sm font-bold text-stone-400 bg-stone-800 px-4 py-3 rounded-full">
                      {currentStroke>=0?Math.min(currentStroke+1,paths.length):0}/{paths.length} Strokes
                    </div>
                  </div>
                </div>
              ) : kanjiData && svgFailed ? (
                <div className="flex-1 w-full flex flex-col items-center justify-center min-h-[300px]">
                  <div className="relative w-64 h-64 sm:w-72 sm:h-72 lg:w-80 lg:h-80 bg-[#161310] border-2 border-dashed border-stone-700 rounded-2xl overflow-hidden shadow-inner flex items-center justify-center">
                    <div className="absolute inset-0 pointer-events-none"><div className="absolute top-1/2 w-full h-px bg-stone-700"></div><div className="absolute left-1/2 w-px h-full bg-stone-700"></div></div>
                    <span className="text-[10rem] font-serif text-stone-100 leading-none select-none">{kanjiData.kanji}</span>
                  </div>
                  <p className="text-xs text-stone-400 mt-4 font-medium">Stroke animation unavailable</p>
                </div>
              ) : null}
            </div>

            {/* RIGHT — Search & Info OR Quiz (mobile: hidden when kanji tab) */}
            <div className={`flex-col gap-6 ${mobileTab==='learn'?'flex':'hidden'} lg:flex`}>
              {quizMode && quiz ? (
                <div className="bg-[#1C1917] p-6 md:p-8 rounded-[2rem] shadow-[0_12px_40px_rgba(0,0,0,0.5)] border border-[#2A2520] flex flex-col gap-5">
                  {/* Quiz Header */}
                  <div className="flex items-center justify-between pb-4 border-b border-stone-800">
                    <div className="flex items-center gap-2">
                      <I.Trophy className="w-5 h-5 text-amber-400"/>
                      <span className="font-black text-amber-300 text-sm">QUIZ MODE</span>
                      {jlptFilter!=='All'&&<span className="text-xs font-bold px-2 py-0.5 rounded-full bg-stone-800 text-stone-400">{jlptFilter}</span>}
                    </div>
                    <div className="flex items-center gap-3">
                      <span className="text-sm font-black text-stone-300">{quiz.score}<span className="text-stone-500 font-normal">/{quiz.total}</span></span>
                      <button onClick={exitQuiz} className="p-1.5 hover:bg-stone-700 rounded-lg text-stone-400"><I.X className="w-4 h-4"/></button>
                    </div>
                  </div>
                  {/* Question */}
                  <div className="text-center">
                    <p className="text-xs font-bold text-stone-400 uppercase tracking-wider mb-3">
                      {quiz.qType==='reading' ? 'この漢字の読み方は？/ คำอ่านคืออะไร？' : 'この漢字の意味は？/ ความหมายคืออะไร？'}
                    </p>
                    <div className="text-7xl font-black text-stone-100 my-4">{quiz.kanji?.kanji}</div>
                  </div>
                  {/* Choices */}
                  <div className="grid grid-cols-2 gap-3">
                    {quiz.choices.map((c,i)=>{
                      const isSelected = quiz.selected===c;
                      const isCorrect = c===quiz.correct;
                      const showResult = !!quiz.selected;
                      let cls = 'p-4 rounded-2xl text-sm font-bold text-left leading-snug transition-all border-2 ';
                      if(!showResult) cls += 'bg-stone-800 text-stone-200 border-stone-700 hover:border-red-500 hover:bg-stone-700 cursor-pointer';
                      else if(isCorrect) cls += 'bg-emerald-900/50 text-emerald-200 border-emerald-600';
                      else if(isSelected) cls += 'bg-red-900/50 text-red-200 border-red-600';
                      else cls += 'bg-stone-800/40 text-stone-500 border-stone-800';
                      return (
                        <button key={i} onClick={()=>answerQuiz(c)} disabled={!!quiz.selected} className={cls}>
                          {showResult&&isCorrect&&<I.Check className="w-4 h-4 inline mr-1 text-emerald-400"/>}
                          {showResult&&isSelected&&!isCorrect&&<I.X className="w-4 h-4 inline mr-1 text-red-400"/>}
                          {c}
                        </button>
                      );
                    })}
                  </div>
                  {/* Result + Next */}
                  {quiz.selected && (
                    <div className="flex flex-col gap-3 mt-2">
                      <div className={`text-center font-black text-base ${quiz.selected===quiz.correct?'text-emerald-400':'text-red-400'}`}>
                        {quiz.selected===quiz.correct ? '✓ ถูกต้อง！Correct！' : `✗ ไม่ถูก。Correct: ${quiz.correct}`}
                      </div>
                      <button onClick={()=>nextQuizQuestion(quiz)} className="w-full py-3 bg-amber-700 hover:bg-amber-600 text-white font-black rounded-2xl transition-colors flex items-center justify-center gap-2">
                        Next Question →
                      </button>
                    </div>
                  )}
                </div>
              ) : (
              <div className="bg-[#1C1917] p-6 md:p-8 rounded-[2rem] shadow-[0_12px_40px_rgba(0,0,0,0.5)] border border-[#2A2520] flex-1 flex flex-col">

                {/* JLPT Filter Row */}
                <div className="flex items-center gap-2 mb-4 pb-4 border-b border-stone-800 flex-wrap">
                  <span className="text-xs font-black text-stone-400 uppercase tracking-wider mr-1">JLPT:</span>
                  {filterBtns.map(({lv,label,active,inactive})=>(
                    <button key={lv} onClick={()=>changeFilter(lv)}
                      className={`px-3 py-1.5 rounded-full text-xs font-black transition-all ${jlptFilter===lv ? active : inactive}`}>
                      {label}
                      <span className={`ml-1 font-normal ${jlptFilter===lv?'opacity-80':'opacity-60'}`}>
                        ({levelCount(lv)})
                      </span>
                    </button>
                  ))}
                  <button onClick={()=>changeFilter('FAV')}
                    className={`px-3 py-1.5 rounded-full text-xs font-black transition-all flex items-center gap-1 ${jlptFilter==='FAV'?'bg-pink-500 text-white':'bg-pink-900/30 text-pink-400 border border-pink-800 hover:bg-pink-900/50'}`}>
                    <I.Heart className="w-3 h-3" filled={jlptFilter==='FAV'}/> ({favorites.length})
                  </button>
                </div>

                {/* Search Row */}
                <div className="flex flex-col gap-2 mb-6">
                  <form onSubmit={handleSearchSubmit} className="flex gap-2 relative">
                    <input type="text" value={searchInput} onChange={e=>setSearchInput(e.target.value)} placeholder="みず・water・น้ำ・山"
                      className="flex-1 min-w-0 pl-4 pr-10 py-3 border-2 border-stone-700 rounded-xl focus:border-red-500 outline-none text-base bg-stone-800 text-stone-100 placeholder-stone-500 focus:bg-[#1f1c19] transition-colors"/>
                    <button type="button" onClick={startListening} className={`absolute right-14 top-1/2 -translate-y-1/2 p-2 rounded-lg transition-colors ${isListening?'bg-red-900/50 text-red-400 animate-pulse':'text-stone-500 hover:text-red-400 hover:bg-red-900/30'}`}>
                      {isListening?<I.Mic className="w-5 h-5"/>:<I.MicOff className="w-5 h-5"/>}
                    </button>
                    <button type="submit" disabled={loading||!searchInput.trim()} className="px-4 py-3 bg-stone-800 text-white rounded-xl font-bold disabled:opacity-50 hover:bg-stone-700 transition-colors flex items-center justify-center shadow-md w-12">
                      <I.Srch className="w-5 h-5"/>
                    </button>
                  </form>
                  <button onClick={handleRandom} disabled={loading} className="w-full flex items-center justify-center gap-2 px-4 py-3 bg-red-900/30 text-red-300 border border-red-800 rounded-xl font-bold hover:bg-red-900/50 disabled:opacity-50 transition-all text-sm">
                    <I.Ref className={`w-4 h-4 ${loading?'animate-spin':''}`}/>
                    Random{jlptFilter!=='All'?` (${jlptFilter})`:''}
                  </button>
                </div>

                {error && <div className="mb-4 text-center text-red-400 bg-red-950/50 p-4 rounded-2xl border border-red-900/50"><p className="font-bold text-sm">{error}</p></div>}

                {wordCandidates.length>0 && (
                  <div className="mb-6 p-4 bg-stone-800/50 rounded-2xl border border-stone-700">
                    <h3 className="text-xs font-bold text-stone-400 mb-3">Select a word / เลือกคำ:</h3>
                    <div className="flex flex-wrap gap-2 mb-4">
                      {wordCandidates.map((c,i)=>(
                        <button key={i} onClick={()=>handleWordSelect(c)} className={`px-3 py-2 rounded-lg text-sm font-bold transition-all ${selectedWord?.word===c.word?'bg-red-700 text-white shadow-md':'bg-stone-700 text-stone-200 border border-stone-600 hover:bg-red-900/30 hover:border-red-800'}`}>
                          {c.word} <span className="font-normal opacity-80 ml-1 text-xs">({c.meaning})</span>
                        </button>
                      ))}
                    </div>
                    {selectedWord && selectableKanjis.length>0 && (
                      <div className="pt-4 border-t border-stone-700 flex items-center gap-3">
                        <span className="text-xs font-bold text-stone-500">Which Kanji?</span>
                        <div className="flex gap-2">
                          {selectableKanjis.map((k,i)=>(
                            <button key={i} onClick={()=>fetchKanji(k)} className={`w-10 h-10 rounded-xl text-lg font-black transition-all ${kanjiData?.kanji===k?'bg-stone-200 text-stone-900 shadow-lg scale-110':'bg-stone-700 text-stone-200 border-2 border-stone-600 hover:border-red-500'}`}>{k}</button>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                )}

                {kanjiData ? (
                  <div className="space-y-5 flex-1 overflow-y-auto pr-2 pb-4">
                    <div className="flex items-center gap-4 mb-2 flex-wrap">
                      <h2 className="text-4xl font-black text-stone-100">{kanjiData.kanji}</h2>
                      <span className="text-xs font-bold text-red-400 uppercase tracking-widest">Lesson Data</span>
                      <LevelBadge level={kanjiData.level}/>
                      <button onClick={()=>toggleFavorite(kanjiData.kanji)} className={`ml-auto p-2 rounded-xl transition-all ${isFav(kanjiData.kanji)?'text-pink-400 bg-pink-900/30 border border-pink-800':'text-stone-500 hover:text-pink-400 hover:bg-pink-900/20 border border-transparent'}`} title="お気に入り">
                        <I.Heart className="w-5 h-5" filled={isFav(kanjiData.kanji)}/>
                      </button>
                    </div>
                    <div>
                      <h3 className="text-xs font-bold text-stone-400 uppercase tracking-wider mb-1.5 flex items-center gap-2"><I.Book className="w-3.5 h-3.5"/> Reading & Meaning</h3>
                      <div className="bg-stone-800/50 p-3.5 rounded-2xl border border-stone-700">
                        <p className="font-bold text-stone-100 mb-1 text-base">{kanjiData.reading}</p>
                        <p className="text-stone-400 font-medium text-sm">{kanjiData.meaning}</p>
                      </div>
                    </div>
                    <div>
                      <h3 className="text-xs font-bold text-amber-400 uppercase tracking-wider mb-1.5 flex items-center gap-2"><I.Bulb className="w-3.5 h-3.5"/> Tips / เคล็ดลับ</h3>
                      <div className="bg-amber-950/30 p-3.5 rounded-2xl border border-amber-900/50 text-amber-200 leading-relaxed font-medium text-sm">{kanjiData.tips}</div>
                    </div>
                    {kanjiData.compounds?.length>0 && (
                      <div>
                        <h3 className="text-xs font-bold text-teal-400 uppercase tracking-wider mb-1.5 flex items-center gap-2"><I.List className="w-3.5 h-3.5"/> Compounds / คำประสม</h3>
                        <div className="bg-teal-950/30 p-3.5 rounded-2xl border border-teal-900/50">
                          <ul className="space-y-1.5">
                            {kanjiData.compounds.map((c,i)=>(<li key={i} className="flex items-center gap-2 text-teal-200 font-bold text-sm"><span className="w-1.5 h-1.5 bg-teal-500 rounded-full flex-shrink-0"></span>{c}</li>))}
                          </ul>
                        </div>
                      </div>
                    )}
                  </div>
                ) : (!loading && !wordCandidates.length && !error) ? (
                  <div className="flex-1 flex items-center justify-center text-stone-400 font-medium text-sm pb-8 text-center leading-relaxed">
                    みず・かわ・やま・たべる<br/>water・fire・school・red<br/>น้ำ・ไฟ・กิน・สีแดง
                  </div>
                ) : null}
              </div>
              )}
            </div>
          </div>
          {/* Mobile Tab Bar */}
          <div className="lg:hidden fixed bottom-0 left-0 right-0 bg-[#1C1917] border-t border-[#2A2520] flex z-50 pb-safe">
            <button onClick={()=>{setMobileTab('learn');setQuizMode(false);}} className={`flex-1 py-3 flex flex-col items-center gap-1 transition-colors ${mobileTab==='learn'&&!quizMode?'text-red-400':'text-stone-500'}`}>
              <I.Book className="w-5 h-5"/>
              <span className="text-[10px] font-black tracking-wider">学習 / เรียน</span>
            </button>
            <button onClick={()=>{ setMobileTab('kanji'); setQuizMode(false); }} className={`flex-1 py-3 flex flex-col items-center gap-1 transition-colors ${mobileTab==='kanji'?'text-red-400':'text-stone-500'}`}>
              <span className="text-xl font-black font-serif leading-none">漢</span>
              <span className="text-[10px] font-black tracking-wider">筆順 / จังหวะ</span>
            </button>
            <button onClick={()=>{ setMobileTab('learn'); if(!quizMode){setQuizMode(true);startQuiz();} }} className={`flex-1 py-3 flex flex-col items-center gap-1 transition-colors ${quizMode?'text-amber-400':'text-stone-500'}`}>
              <I.Trophy className="w-5 h-5"/>
              <span className="text-[10px] font-black tracking-wider">Quiz</span>
            </button>
          </div>
        </div>
      );
    };
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
